<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swapnonil Nandi — Phantom Labs</title>
  <meta name="description" content="Founder @ Phantom Labs. Security-focused software developer." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05050f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-glow: rgba(123, 97, 255, 0.35);
      --accent: #7b61ff;
      --accent2: #a78bfa;
      --accent3: #38bdf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'Space Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,97,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(56,189,248,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(167,139,250,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0%   { opacity: 0.8; }
      100% { opacity: 1; }
    }

    /* Grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(123,97,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,97,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      gap: 1.5rem;
    }

    /* Ghost signal dot — brand mark */
    .brand-mark {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      animation-delay: 0.1s;
    }

    .brand-mark .ghost-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent), 0 0 24px rgba(123,97,255,0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.7; }
    }

    .brand-mark span {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent2);
      text-transform: uppercase;
    }

    /* Main card */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(123,97,255,0.1),
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      opacity: 0;
      transform: translateY(30px) scale(0.97);
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.3s;
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Card corner glow */
    .card::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(123,97,255,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -40px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(56,189,248,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Dot grid decoration */
    .dot-grid {
      position: absolute;
      top: 1.2rem;
      right: 1.2rem;
      display: grid;
      grid-template-columns: repeat(4, 4px);
      gap: 4px;
      opacity: 0.25;
    }

    .dot-grid span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent2);
      display: block;
    }

    .card-header {
      margin-bottom: 1.8rem;
    }

    .org {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.8rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.6s;
    }

    .name {
      font-family: var(--display);
      font-weight: 800;
      font-size: clamp(1.8rem, 7vw, 2.4rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #fff;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.75s;
    }

    .role-line {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.6rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.9s;
    }

    .role {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      font-family: var(--mono);
    }

    .role-divider {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border-glow), transparent);
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(123,97,255,0.1);
      border: 1px solid rgba(123,97,255,0.2);
      border-radius: 100px;
      padding: 0.3rem 0.75rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--accent2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 1rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 1s;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse 2s infinite;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
      margin: 1.5rem 0;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 1.05s;
    }

    /* Contact links */
    .contacts {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 1.1s;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      text-decoration: none;
      color: var(--text);
      padding: 0.6rem 0.8rem;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .contact-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(123,97,255,0.06);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .contact-item:hover::before { opacity: 1; }
    .contact-item:hover {
      border-color: var(--border-glow);
      transform: translateX(4px);
    }

    .contact-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: rgba(123,97,255,0.12);
      border: 1px solid rgba(123,97,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 15px;
      height: 15px;
      color: var(--accent2);
      fill: currentColor;
    }

    .contact-text {
      display: flex;
      flex-direction: column;
    }

    .contact-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .contact-value {
      font-size: 0.88rem;
      color: var(--text);
      font-family: var(--mono);
    }

    /* CTA Button */
    .save-btn {
      width: 100%;
      max-width: 400px;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px rgba(123,97,255,0.3), 0 4px 15px rgba(0,0,0,0.3);
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 1.3s;
    }

    .save-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .save-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(123,97,255,0.5), 0 8px 25px rgba(0,0,0,0.4); }
    .save-btn:hover::before { opacity: 1; }
    .save-btn:active { transform: translateY(0); }

    .save-btn.saved {
      background: linear-gradient(135deg, #059669, #047857);
      box-shadow: 0 0 20px rgba(5,150,105,0.3);
    }

    /* Social row */
    .social-row {
      display: flex;
      gap: 0.6rem;
      width: 100%;
      max-width: 400px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 1.45s;
    }

    .social-btn {
      flex: 1;
      padding: 0.7rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-align: center;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .social-btn:hover {
      border-color: var(--border-glow);
      color: var(--accent2);
      background: rgba(123,97,255,0.08);
    }

    /* Footer */
    .footer {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 1.6s;
    }

    .footer span { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Scan line effect on load */
    .scanline {
      position: fixed;
      top: -100%;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 1.2s ease forwards;
      z-index: 10;
      pointer-events: none;
    }

    @keyframes scan {
      0%   { top: -2px; opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
  </style>
</head>
<body>

<div class="scanline"></div>

<div class="container">

  <!-- Brand mark -->
  <div class="brand-mark">
    <div class="ghost-dot"></div>
    <span>Phantom Labs</span>
  </div>

  <!-- Main card -->
  <div class="card">
    <!-- Dot grid decoration -->
    <div class="dot-grid">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="card-header">
      <div class="org">phantom_labs // founder</div>
      <div class="name">Swapnonil<br>Nandi</div>
      <div class="role-line">
        <span class="role">Software Developer</span>
        <div class="role-divider"></div>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        Available for Hire
      </div>
    </div>

    <div class="divider"></div>

    <div class="contacts">
      <a href="mailto:contact@swapnonil.me" class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <div class="contact-text">
          <span class="contact-label">Email</span>
          <span class="contact-value">contact@swapnonil.me</span>
        </div>
      </a>

      <a href="https://swapnonil.me" target="_blank" class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </div>
        <div class="contact-text">
          <span class="contact-label">Website</span>
          <span class="contact-value">swapnonil.me</span>
        </div>
      </a>

      <a href="https://github.com/swapn0n11" target="_blank" class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>
        </div>
        <div class="contact-text">
          <span class="contact-label">GitHub</span>
          <span class="contact-value">swapn0n11</span>
        </div>
      </a>
    </div>
  </div>

  <!-- Save contact CTA -->
  <button class="save-btn" id="saveBtn" onclick="saveContact()">
    ↓ &nbsp; Save Contact
  </button>

  <!-- Social row -->
  <div class="social-row">
    <a href="https://github.com/swapn0n11" target="_blank" class="social-btn">GitHub</a>
    <a href="https://linkedin.com/in/swapnon11" target="_blank" class="social-btn">LinkedIn</a>
    <a href="https://x.com/swapn_n11" target="_blank" class="social-btn">X / Twitter</a>
  </div>

  <div class="footer">
    <span>ghost_signal</span> // tap · share · connect
  </div>

</div>

<script>
  function saveContact() {
    const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Swapnonil Nandi
N:Nandi;Swapnonil;;;
ORG:Phantom Labs
TITLE:Founder
EMAIL;TYPE=INTERNET:contact@swapnonil.me
URL:https://swapnonil.me
X-SOCIALPROFILE;type=github:https://github.com/swapn0n11
X-SOCIALPROFILE;type=linkedin:https://linkedin.com/in/swapnon11
NOTE:Because people need <Privacy>
END:VCARD`;

    const blob = new Blob([vcard], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'swapnonil-nandi.vcf';
    a.click();
    URL.revokeObjectURL(url);

    const btn = document.getElementById('saveBtn');
    btn.textContent = '✓  Contact Saved';
    btn.classList.add('saved');
    setTimeout(() => {
      btn.textContent = '↓   Save Contact';
      btn.classList.remove('saved');
    }, 3000);
  }
</script>

</body>
</html>
