<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Swapnonil Nandi</title>
  <meta name="description" content="Open source projects by Swapnonil Nandi @ Phantom Labs." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05050f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --border-glow: rgba(123,97,255,0.35);
      --accent: #7b61ff;
      --accent2: #a78bfa;
      --accent3: #38bdf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'Space Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      overflow-x: hidden;
    }

    .bg-layer {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .bg-layer::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 10%, rgba(123,97,255,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 85%, rgba(56,189,248,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 40% 60% at 50% 40%, rgba(167,139,250,0.04) 0%, transparent 60%);
      animation: bgPulse 10s ease-in-out infinite alternate;
    }
    @keyframes bgPulse { 0% { opacity: 0.7; } 100% { opacity: 1; } }
    .bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(123,97,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,97,255,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .scanline {
      position: fixed; top: -2px; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 1.2s ease forwards;
      z-index: 100; pointer-events: none;
    }
    @keyframes scan { 0% { top: -2px; opacity: 1; } 100% { top: 100%; opacity: 0; } }

    .page {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--mono); font-size: 0.65rem;
      color: var(--muted); text-decoration: none;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 2.5rem; transition: color 0.2s;
      opacity: 0; animation: fadeUp 0.5s ease forwards 0.1s;
    }
    .back-link:hover { color: var(--accent2); }
    .back-link svg { width: 12px; height: 12px; fill: currentColor; }

    /* Header */
    .header { margin-bottom: 3rem; opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s; }

    .brand-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.2rem; }
    .ghost-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent), 0 0 24px rgba(123,97,255,0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.5); opacity:0.6; } }
    .brand-label { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.2em; color: var(--accent2); text-transform: uppercase; }

    .page-title {
      font-family: var(--display); font-weight: 800;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      line-height: 1; letter-spacing: -0.03em; color: #fff; margin-bottom: 0.8rem;
    }
    .page-title span {
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-subtitle { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); letter-spacing: 0.04em; line-height: 1.7; max-width: 500px; }

    /* Stats */
    .stats-bar {
      display: flex; align-items: center; gap: 2rem; margin-top: 1.8rem; flex-wrap: wrap;
      opacity: 0; animation: fadeUp 0.6s ease forwards 0.45s;
    }
    .stat { display: flex; flex-direction: column; gap: 0.2rem; }
    .stat-value { font-family: var(--mono); font-size: 1.4rem; font-weight: 700; color: #fff; line-height: 1; }
    .stat-label { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
    .stat-divider { width: 1px; height: 2rem; background: var(--border); }

    /* Filters */
    .filter-row {
      display: flex; gap: 0.5rem; margin-bottom: 2.5rem; flex-wrap: wrap;
      opacity: 0; animation: fadeUp 0.6s ease forwards 0.55s;
    }
    .filter-btn {
      padding: 0.38rem 1rem; border-radius: 100px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: var(--mono); font-size: 0.62rem;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--border-glow); color: var(--accent2); background: rgba(123,97,255,0.08);
    }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.2rem; }

    /* Repo card */
    .repo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 1.6rem;
      position: relative; overflow: hidden;
      cursor: pointer; text-decoration: none; display: block;
      transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), border-color 0.25s, box-shadow 0.25s;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      opacity: 0; transform: translateY(20px);
    }
    .repo-card.visible { animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes cardIn { to { opacity:1; transform:translateY(0); } }

    .repo-card::before {
      content: ''; position: absolute; top: -50px; right: -50px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(123,97,255,0.18) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .repo-card:hover {
      border-color: var(--border-glow);
      transform: translateY(-5px);
      box-shadow: 0 0 0 1px rgba(123,97,255,0.12), 0 24px 50px rgba(0,0,0,0.5), 0 0 40px rgba(123,97,255,0.07);
    }
    .repo-card:hover::before { opacity: 1; }

    /* Blur overlay on hover */
    .detail-overlay {
      position: absolute; inset: 0; border-radius: 18px;
      background: rgba(5, 5, 15, 0.85);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      opacity: 0; transition: opacity 0.3s ease;
      display: flex; flex-direction: column; justify-content: center;
      padding: 1.6rem; gap: 0.85rem; pointer-events: none;
    }
    .repo-card:hover .detail-overlay { opacity: 1; }

    .overlay-label { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.16em; color: var(--accent); text-transform: uppercase; }
    .overlay-desc { font-size: 0.88rem; color: var(--text); line-height: 1.65; font-family: var(--display); }
    .overlay-topics { display: flex; flex-wrap: wrap; gap: 0.45rem; }
    .overlay-topic {
      padding: 0.22rem 0.6rem; border-radius: 6px;
      background: rgba(123,97,255,0.1); border: 1px solid rgba(123,97,255,0.2);
      font-family: var(--mono); font-size: 0.58rem; color: var(--accent2); letter-spacing: 0.06em;
    }
    .overlay-stats { display: flex; gap: 1.2rem; }
    .overlay-stat {
      display: flex; align-items: center; gap: 0.4rem;
      font-family: var(--mono); font-size: 0.68rem; color: var(--muted);
    }
    .overlay-stat svg { width: 12px; height: 12px; fill: var(--muted); }
    .overlay-cta {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--mono); font-size: 0.62rem; color: var(--accent2);
      letter-spacing: 0.08em; text-transform: uppercase;
      border-top: 1px solid var(--border); padding-top: 0.8rem;
    }
    .overlay-cta svg { width: 12px; height: 12px; fill: currentColor; }

    /* Card default content */
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
    .repo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(123,97,255,0.1); border: 1px solid rgba(123,97,255,0.2);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .repo-icon svg { width: 15px; height: 15px; fill: var(--accent2); }
    .lang-badge { display: flex; align-items: center; gap: 0.35rem; font-family: var(--mono); font-size: 0.6rem; color: var(--muted); }
    .lang-dot { width: 7px; height: 7px; border-radius: 50%; }
    .repo-name { font-family: var(--display); font-weight: 600; font-size: 1rem; color: #fff; margin-bottom: 0.4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .repo-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 1.2rem; min-height: 2.4em; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 0.85rem; }
    .card-stats { display: flex; gap: 1rem; }
    .card-stat { display: flex; align-items: center; gap: 0.35rem; font-family: var(--mono); font-size: 0.62rem; color: var(--muted); }
    .card-stat svg { width: 11px; height: 11px; fill: var(--muted); }
    .updated-label { font-family: var(--mono); font-size: 0.57rem; color: var(--muted); opacity: 0.5; }

    /* Skeleton */
    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.2rem; }
    .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 1.6rem; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0%,100% { opacity: 0.35; } 50% { opacity: 0.65; } }
    .skel { background: rgba(255,255,255,0.06); border-radius: 4px; margin-bottom: 0.6rem; }

    /* Error */
    .error-state { text-align: center; padding: 4rem 1rem; font-family: var(--mono); color: var(--muted); }
    .error-code { color: var(--accent); font-size: 2.5rem; font-weight: 700; margin-bottom: 0.6rem; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 600px) {
      .page { padding: 2.5rem 1rem 4rem; }
      .grid, .skeleton-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="scanline"></div>

<div class="page">

  <a href="/" class="back-link">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back to Home
  </a>

  <div class="header">
    <div class="brand-row">
      <div class="ghost-dot"></div>
      <span class="brand-label">phantom_labs // open source</span>
    </div>
    <h1 class="page-title">My <span>Projects</span></h1>
    <p class="page-subtitle">Things I've built, broken, and shipped.<br>Pulled live from GitHub.</p>
  </div>

  <div class="stats-bar" id="statsBar" style="visibility:hidden">
    <div class="stat"><span class="stat-value" id="repoCount">—</span><span class="stat-label">Repos</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-value" id="starCount">—</span><span class="stat-label">Stars</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-value" id="langCount">—</span><span class="stat-label">Languages</span></div>
  </div>

  <div class="filter-row" id="filterRow" style="display:none"></div>

  <div id="content">
    <div class="skeleton-grid" id="skeleton">
      <div class="skeleton-card"><div class="skel" style="width:38%;height:11px"></div><div class="skel" style="width:65%;height:18px;margin-top:.7rem"></div><div class="skel" style="width:88%;height:10px;margin-top:.4rem"></div><div class="skel" style="width:55%;height:10px"></div><div class="skel" style="width:28%;height:10px;margin-top:1.2rem"></div></div>
      <div class="skeleton-card"><div class="skel" style="width:42%;height:11px"></div><div class="skel" style="width:70%;height:18px;margin-top:.7rem"></div><div class="skel" style="width:82%;height:10px;margin-top:.4rem"></div><div class="skel" style="width:60%;height:10px"></div><div class="skel" style="width:32%;height:10px;margin-top:1.2rem"></div></div>
      <div class="skeleton-card"><div class="skel" style="width:35%;height:11px"></div><div class="skel" style="width:75%;height:18px;margin-top:.7rem"></div><div class="skel" style="width:90%;height:10px;margin-top:.4rem"></div><div class="skel" style="width:50%;height:10px"></div><div class="skel" style="width:25%;height:10px;margin-top:1.2rem"></div></div>
      <div class="skeleton-card"><div class="skel" style="width:45%;height:11px"></div><div class="skel" style="width:68%;height:18px;margin-top:.7rem"></div><div class="skel" style="width:80%;height:10px;margin-top:.4rem"></div><div class="skel" style="width:58%;height:10px"></div><div class="skel" style="width:30%;height:10px;margin-top:1.2rem"></div></div>
      <div class="skeleton-card"><div class="skel" style="width:40%;height:11px"></div><div class="skel" style="width:72%;height:18px;margin-top:.7rem"></div><div class="skel" style="width:85%;height:10px;margin-top:.4rem"></div><div class="skel" style="width:62%;height:10px"></div><div class="skel" style="width:27%;height:10px;margin-top:1.2rem"></div></div>
      <div class="skeleton-card"><div class="skel" style="width:36%;height:11px"></div><div class="skel" style="width:66%;height:18px;margin-top:.7rem"></div><div class="skel" style="width:78%;height:10px;margin-top:.4rem"></div><div class="skel" style="width:54%;height:10px"></div><div class="skel" style="width:34%;height:10px;margin-top:1.2rem"></div></div>
    </div>
  </div>

</div>

<script>
const GH_USER = 'swapn0n11';

const LANG_COLORS = {
  JavaScript:'#f7df1e', TypeScript:'#3178c6', Python:'#3572A5',
  HTML:'#e34c26', CSS:'#563d7c', 'C++':'#f34b7d', C:'#555555',
  Shell:'#89e051', Rust:'#dea584', Go:'#00ADD8', Vue:'#41b883',
  Svelte:'#ff3e00', Ruby:'#701516', PHP:'#4F5D95', Java:'#b07219',
  Kotlin:'#A97BFF', Swift:'#F05138', Dart:'#00B4AB'
};

function langColor(l) { return LANG_COLORS[l] || '#6e7681'; }

function timeAgo(d) {
  const days = Math.floor((Date.now() - new Date(d)) / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return '1d ago';
  if (days < 30) return days + 'd ago';
  if (days < 365) return Math.floor(days/30) + 'mo ago';
  return Math.floor(days/365) + 'y ago';
}

const starSVG = `<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
const forkSVG = `<svg viewBox="0 0 24 24"><path d="M6 2a3 3 0 0 1 3 3v1h6V5a3 3 0 1 1 2 2.83V7h-1v8.17A3.001 3.001 0 1 1 13 18v-1H9v1a3 3 0 1 1-2-2.83V7H6V5.17A3.001 3.001 0 0 1 6 2z"/></svg>`;
const arrowSVG = `<svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>`;
const repoSVG = `<svg viewBox="0 0 24 24"><path d="M12 .3a12 12 0 1 0 0 24 12 12 0 0 0 0-24zm3.1 14.3l-4.1 4.1a1 1 0 0 1-1.4-1.4l3.4-3.4-3.4-3.4a1 1 0 1 1 1.4-1.4l4.1 4.1a1 1 0 0 1 0 1.4z"/></svg>`;

function buildCard(repo, i) {
  const lc = langColor(repo.language);
  const desc = repo.description || 'No description provided.';
  const topics = (repo.topics || []).slice(0, 4);

  return `
  <a class="repo-card" href="${repo.html_url}" target="_blank" rel="noopener"
     data-lang="${repo.language || ''}" style="animation-delay:${i * 0.065}s">

    <div class="detail-overlay">
      <div class="overlay-label">// ${repo.name}</div>
      <div class="overlay-desc">${desc}</div>
      ${topics.length ? `<div class="overlay-topics">${topics.map(t=>`<span class="overlay-topic">${t}</span>`).join('')}</div>` : ''}
      <div class="overlay-stats">
        <div class="overlay-stat">${starSVG} ${repo.stargazers_count} stars</div>
        <div class="overlay-stat">${forkSVG} ${repo.forks_count} forks</div>
        ${repo.language ? `<div class="overlay-stat"><span style="width:8px;height:8px;border-radius:50%;background:${lc};display:inline-block;flex-shrink:0"></span>${repo.language}</div>` : ''}
      </div>
      <div class="overlay-cta">${arrowSVG} View on GitHub</div>
    </div>

    <div class="card-top">
      <div class="repo-icon">${repoSVG}</div>
      ${repo.language ? `<div class="lang-badge"><span class="lang-dot" style="background:${lc}"></span>${repo.language}</div>` : ''}
    </div>
    <div class="repo-name">${repo.name}</div>
    <div class="repo-desc">${desc}</div>
    <div class="card-footer">
      <div class="card-stats">
        <div class="card-stat">${starSVG} ${repo.stargazers_count}</div>
        <div class="card-stat">${forkSVG} ${repo.forks_count}</div>
      </div>
      <span class="updated-label">${timeAgo(repo.updated_at)}</span>
    </div>
  </a>`;
}

async function init() {
  try {
    const res = await fetch(`https://api.github.com/users/${GH_USER}/repos?sort=updated&per_page=30&type=public`);
    if (!res.ok) throw new Error('GitHub API ' + res.status);
    const repos = await res.json();
    const sorted = [...repos].sort((a,b) => b.stargazers_count - a.stargazers_count);

    // Remove skeleton
    document.getElementById('skeleton').remove();

    // Build grid
    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.innerHTML = sorted.map(buildCard).join('');
    document.getElementById('content').appendChild(grid);

    // Stagger reveal
    requestAnimationFrame(() => {
      document.querySelectorAll('.repo-card').forEach((c, i) => {
        setTimeout(() => c.classList.add('visible'), i * 65);
      });
    });

    // Stats
    const sb = document.getElementById('statsBar');
    document.getElementById('repoCount').textContent = sorted.length;
    document.getElementById('starCount').textContent = sorted.reduce((s,r) => s + r.stargazers_count, 0);
    document.getElementById('langCount').textContent = new Set(sorted.map(r=>r.language).filter(Boolean)).size;
    sb.style.visibility = 'visible';

    // Filters
    const langs = [...new Set(sorted.map(r=>r.language).filter(Boolean))];
    const fr = document.getElementById('filterRow');
    fr.style.display = 'flex';
    fr.innerHTML = `<button class="filter-btn active" data-lang="">All</button>` +
      langs.map(l => `<button class="filter-btn" data-lang="${l}">${l}</button>`).join('');

    fr.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      fr.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const lang = btn.dataset.lang;
      document.querySelectorAll('.repo-card').forEach(c => {
        c.style.display = (!lang || c.dataset.lang === lang) ? 'block' : 'none';
      });
    });

  } catch(err) {
    document.getElementById('skeleton').remove();
    document.getElementById('content').innerHTML = `
      <div class="error-state">
        <div class="error-code">ERR</div>
        <div style="margin-bottom:.5rem">Couldn't reach GitHub API.</div>
        <div style="font-size:.7rem">Rate limited or network issue. Try again shortly.</div>
        <div style="margin-top:1rem;font-size:.62rem;color:var(--accent)">${err.message}</div>
      </div>`;
  }
}

init();
</script>
</body>
</html>
